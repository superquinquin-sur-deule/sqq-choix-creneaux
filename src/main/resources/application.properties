# Application
quarkus.application.name=choix-creneaux
quarkus.http.enable-compression=true
quarkus.http.compress-media-types=application/json,text/html,text/css,application/javascript

# Graceful Shutdown
quarkus.shutdown.delay-enabled=true
quarkus.shutdown.delay=10s

# Logs
quarkus.log.console.json.enabled=false
%prod.quarkus.log.console.json.enabled=true

# Arc - keep handler beans (discovered dynamically by the mediator)
quarkus.arc.unremovable-types=fr.sqq.choixcreneaux.application.handler.command.**,fr.sqq.choixcreneaux.application.handler.query.**

# OpenAPI
quarkus.smallrye-openapi.store-schema-directory=target/openapi
quarkus.smallrye-openapi.info-title=Choix Creneaux API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.security-scheme=oidc
quarkus.smallrye-openapi.oidc-open-id-connect-url=https://placeholder/.well-known/openid-configuration

# Quinoa (Frontend)
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=22.22.0
quarkus.quinoa.package-manager-install.npm-version=11.7.0
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.build-dir=dist
quarkus.quinoa.enable-spa-routing=true

# Database - Dev Services
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.reuse=false
quarkus.datasource.jdbc.min-size=10
quarkus.datasource.jdbc.max-size=50
quarkus.datasource.jdbc.acquisition-timeout=5S
quarkus.datasource.jdbc.idle-removal-interval=2M
%test.quarkus.datasource.devservices.reuse=false
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.flyway.migrate-at-start=true
#%dev.quarkus.flyway.locations=db/migration,db/seed

# OIDC Configuration
quarkus.oidc.client-id=test-app
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.redirect-path=/
quarkus.oidc.authentication.pkce-required=true
quarkus.oidc.authentication.cookie-same-site=lax
quarkus.oidc.token.refresh-expired=true
quarkus.oidc.authentication.session-age-extension=30M
quarkus.oidc.logout.path=/api/logout

# HTTP Auth Permissions
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# App
app.url=http://localhost:8080
app.production=false

app.campaign.open=true
app.campaign.store-opening=2026-05-18
app.campaign.week-a-reference=2015-12-28

# Brevo
brevo.api-key=REPLACEME
brevo.confirmation-template-id=0
brevo.reminder-template-id=0

odoo.url=http://localhost:8069
odoo.db=odoo
odoo.username=admin
odoo.password=admin

# Test profile

%test.app.base-url=http://localhost:8081
%test.quarkus.cucumber.glue=fr.sqq.choixcreneaux.acceptance.steps
%test.quarkus.playwright.headless=true
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.quinoa=true
%test.quarkus.oidc.enabled=false
%test.quarkus.keycloak.devservices.enabled=false

# Dev services
quarkus.keycloak.devservices.image-name=ghcr.io/superquinquin-sur-deule/sqq-keycloak:main
quarkus.keycloak.devservices.keycloak-x-image=true
quarkus.keycloak.devservices.realm-path=keycloak/realm-sqq.json
quarkus.keycloak.devservices.realm-name=sqq
