name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  checks: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      latest-sha: ${{ steps.docker_build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        name: Checkout

      - name: Set up JDK 22
        uses: actions/setup-java@v5
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package

      - name: Determine image tags
        id: meta
        shell: bash
        run: |
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            # For release tags pushed by release-please (e.g., v1.2.3), push only the release tag
            TAG_NO_V="${GITHUB_REF_NAME#v}"
            echo "tags=${IMAGE_BASE}:${TAG_NO_V}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG_NO_V}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            # For main branch: only update latest (release tags are immutable)
            echo "tags=${IMAGE_BASE}:latest" >> "$GITHUB_OUTPUT"
          else
            # Default to not setting tags (no push on PRs)
            echo "tags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main'
    steps:
      - name: Install yq
        uses: mikefarah/yq@master

      - name: Clone GitOps repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMELABITTY_TOKEN }}@github.com/lucas-dclrcq/homelabitty.git

      - name: Update staging image tag
        run: |
          yq -i '.spec.values.controllers.main.containers.main.image.tag = "latest@${{ needs.build.outputs.latest-sha }}"' \
            homelabitty/kubernetes/apps/sqq/sqq-choix-creneaux-staging/app/helmrelease.yaml

      - name: Commit and push
        run: |
          cd homelabitty
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(sqq-choix-creneaux-staging): update image digest to ${{ needs.build.outputs.latest-sha }}"
          git push

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    environment: production
    steps:
      - name: Install yq
        uses: mikefarah/yq@master

      - name: Clone GitOps repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMELABITTY_TOKEN }}@github.com/lucas-dclrcq/homelabitty.git

      - name: Update production image tag
        run: |
          yq -i '.spec.values.controllers.main.containers.main.image.tag = "${{ needs.build.outputs.version }}"' \
            homelabitty/kubernetes/apps/sqq/sqq-choix-creneaux/app/helmrelease.yaml

      - name: Commit and push
        run: |
          cd homelabitty
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(sqq-choix-creneaux): update image tag to ${{ needs.build.outputs.version }}"
          git push
